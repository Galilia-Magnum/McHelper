<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard</title>
<link rel="stylesheet" href="../CSS/Style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="../js/JAVA.js"></script>
</head>

<body>
<div class="dashboard">
    <div class="topbar">
        <div>
            <h1>MC Helper Dashboard</h1>
            <p>Welkom terug Admin</p>
        </div>

        <div class="profile-section">
            <div class="profile-circle">
                .
            </div>

           <a href="Log in.html">  <button class="logout-btn"> 	Log uit
            </button></a>
        </div>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <h2>#</h2>
            <p>Taken klaar</p>
        </div>

        <div class="stat-card">
            <h2>0</h2>
            <p>Open Taken</p>
        </div>

        <div class="stat-card">
            <h2></h2>
            <p></p>
        </div>

    </div>
    <div class="dashboard-grid">
        <div class="dashboard-card">

            <h2>Dagelijkse Checklist</h2>

            <div class="task">
                <input type="checkbox">
                <span>#</span>
            </div>

            <div class="task">
                <input type="checkbox">
                <span>#</span>
            </div>

            <div class="task">
                <input type="checkbox">
                <span>#</span>
            </div>

        </div>
        <div class="dashboard-card">
            <h2>Weekelijk #</h2>
            <p>Maandag - #</p>
            <p>Dinsdag - #</p>
            <p>Woensdag - #</p>
            <p>Donderdag - #</p>
            <p>vrijdag - #</p>
        </div>
        <div class="dashboard-card">
            <h2>Manager Panel</h2>
            <button class="action-btn">
                Verify Uploads
            </button>
            <button class="action-btn">
                Open Reports
            </button>
            <button class="action-btn">
                Manage Staff
            </button>
				<a href="../MC helper V1.html"><button class="action-btn">
                Naar MC Helper
            </button>	</a>

        </div>

    </div>

</div>
</body>
</html>
