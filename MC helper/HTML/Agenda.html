	 <div class="day-card">

        <div class="event-list"></div>
        <textarea placeholder="Extra notes..."></textarea>
        <button class="add-btn">+ Voeg Taak</button>
    </div>
</div>
<script>
const buttons = document.querySelectorAll('.add-btn');
buttons.forEach(button => {

    button.addEventListener('click', () => {
        const eventText = prompt('Enter an event');
        if (eventText) {
            const event = document.createElement('div');
            event.classList.add('event');
            event.innerHTML = eventText;
            const eventList = button.parentElement.querySelector('.event-list');
            eventList.appendChild(event);
        }
    });
});

</script>
